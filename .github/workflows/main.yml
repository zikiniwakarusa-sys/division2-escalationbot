# ------------------------
# 17時リセット（ゲーム仕様）
# ------------------------
def get_active_datetime():
    now = datetime.now(JST)
    reset = now.replace(hour=17, minute=0, second=0, microsecond=0)

    if now < reset:
        active = now - timedelta(days=1)
    else:
        active = now

    return active

def format_jst(dt):
    return dt.strftime("%Y/%m/%d %H:%M JST")

# ------------------------
def load_config():
    with open(CONFIG_FILE) as f:
        return json.load(f)

def load_last():
    if os.path.exists(STATE_FILE):
        with open(STATE_FILE) as f:
            return json.load(f)
    return {}

def save_last(data):
    with open(STATE_FILE, "w") as f:
        json.dump(data, f)

# ------------------------
# データ取得
# ------------------------
def fetch_data():
    res = requests.get(DATA_URL)
    data = res.json()

    active = get_active_datetime().strftime("%Y-%m-%d")
    result = {}

    for section_name, entries in data.items():
        section_pairs = []

        for entry in entries:
            missions = entry.get("missions", [])

            target_loot = None
            for d in entry.get("target_loot_by_day", []):
                if d.get("day") == active:
                    target_loot = d.get("target_loot", [])
                    break

            if not target_loot:
                continue

            for i in range(min(len(missions), len(target_loot))):
                m = MISSION_JA.get(missions[i], missions[i])
                l = target_loot[i]

                if not l:
                    continue

                section_pairs.append((m, l))

        if section_pairs:
            result[section_name] = section_pairs

    return result

# ------------------------
# UI整形（ゲーム風）
# ------------------------
def format_section(title, pairs):
    lines = []
    lines.append("```")
    lines.append("No | ミッション               | ターゲット")
    lines.append("---+-------------------------+-----------")

    for i, (m, l) in enumerate(pairs, 1):
        lines.append(f"{i:>2} | {m[:20]:<20} | {l}")

    lines.append("```")

    return {
        "name": f"🎯 {title}",
        "value": "\n".join(lines),
        "inline": False
    }

# ------------------------
# 投稿
# ------------------------
def post(webhook, sections):
    now = datetime.now(JST)
    active = get_active_datetime()

    if not sections:
        return

    embed = {
        "title": "🟧 Division 2 デイリーターゲット",
        "description": "```diff\n+ TARGETED LOOT ACTIVE\n```",
        "url": "https://hi-dep.github.io/division2/?view=event&lang=ja",
        "color": 0xFF6A00,
        "fields": [],
        "footer": {
            "text": f"更新: {format_jst(now)} / リセット基準: {format_jst(active.replace(hour=17))}"
        }
    }

    for section, pairs in sections.items():
        embed["fields"].append(format_section(section, pairs))

    requests.post(webhook, json={"embeds": [embed]})

# ------------------------
# メイン
# ------------------------
def main():
    config = load_config()
    sections = fetch_data()

    current = {"sections": sections}
    last = load_last()

    if current != last and sections:
        for server in config["servers"]:
            post(server["webhook"], sections)

        save_last(current)
    else:
        print("変更なし or データなし")

if __name__ == "__main__":
    main()